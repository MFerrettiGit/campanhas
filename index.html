<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campanhas de Vendas — Ferretti distribuidora</title>
<script>(function(){try{if(localStorage.getItem('ferretti-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#2B2FA8;--azul-2:#3a3fd0;--azul-dark:#1c1f78;--verde:#34c759;--verde-2:#28a745;--ouro:#f5b942;--bg:#f4f6fb;--card:#fff;--ink:#16182e;--muted:#6b6f8a;--line:#e7eaf3}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px}
header{background:linear-gradient(135deg,var(--azul-dark),var(--azul) 55%,var(--azul-2));color:#fff;padding:34px 0 70px;position:relative;overflow:hidden}
header::after{content:"";position:absolute;right:-90px;bottom:-120px;width:340px;height:340px;border:46px solid rgba(255,255,255,.06);border-radius:50%}
.brand{height:40px}
.eyebrow{font-family:'Plus Jakarta Sans';font-weight:700;letter-spacing:1px;color:#cdd1ff;font-size:.8rem;text-transform:uppercase;margin-top:30px}
h1{font-family:'Plus Jakarta Sans';font-weight:800;font-size:clamp(2rem,5vw,3.1rem);margin-top:8px}
.sub{color:#d4d7ff;margin-top:10px;max-width:600px;font-size:1.05rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:-40px;position:relative;z-index:2;padding-bottom:30px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 14px 34px rgba(20,24,60,.08);text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-4px);box-shadow:0 20px 44px rgba(20,24,60,.14)}
.card .head{padding:46px 22px 20px;background:linear-gradient(135deg,var(--azul-dark),var(--azul-2));color:#fff;position:relative}
.card .nome{font-family:'Plus Jakarta Sans';font-weight:800;font-size:1.3rem}
.status{position:absolute;top:16px;right:16px;font-family:'Plus Jakarta Sans';font-size:.68rem;font-weight:800;letter-spacing:.5px;padding:5px 11px;border-radius:999px}
.status.aberta{background:var(--verde);color:#062b12}
.status.fechada{background:#ffd9d0;color:#9a3412}
.card .body{padding:18px 22px;display:flex;flex-direction:column;gap:10px;flex:1}
.row{display:flex;justify-content:space-between;gap:10px;font-size:.9rem;border-bottom:1px dashed var(--line);padding-bottom:8px}
.row:last-of-type{border-bottom:none}
.row .k{color:var(--muted)}
.row .v{font-family:'Plus Jakarta Sans';font-weight:700;text-align:right}
.cta{margin-top:auto;padding:14px 22px;font-family:'Plus Jakarta Sans';font-weight:800;color:var(--azul);display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line)}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:50px}
footer{padding:30px 0 50px;text-align:center;color:var(--muted);font-size:.85rem;border-top:1px solid var(--line);margin-top:20px}
footer a{color:var(--azul)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.themebtn{display:inline-flex;align-items:center;gap:6px;font-family:'Plus Jakarta Sans';font-size:.85rem;font-weight:600;color:#fff;background:rgba(255,255,255,.14);border:none;padding:8px 14px;border-radius:999px;cursor:pointer}
.themebtn:hover{background:rgba(255,255,255,.26)}

/* TEMA ESCURO */
:root[data-theme="dark"]{--bg:#0e1018;--card:#181b27;--ink:#eceef6;--muted:#9aa0bd;--line:#2a2f42}
[data-theme="dark"] .card{box-shadow:0 14px 34px rgba(0,0,0,.45)}
[data-theme="dark"] .card:hover{box-shadow:0 20px 44px rgba(0,0,0,.6)}
[data-theme="dark"] .cta{color:#8b8fff}
[data-theme="dark"] footer a{color:#8b8fff}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="topbar">
      <img class="brand" src="assets/ferretti-branco.png" alt="Ferretti distribuidora" />
      <button id="themeBtn" class="themebtn" type="button"></button>
    </div>
    <div class="eyebrow">Equipe de Vendas</div>
    <h1>Campanhas de Vendas</h1>
    <p class="sub">Acompanhe a mecânica, os prazos e os resultados de cada campanha da Ferretti distribuidora.</p>
  </div>
</header>
<div class="wrap">
  <div class="grid" id="grid"></div>
</div>
<footer>
  <div class="wrap">
    Ferretti distribuidora · Uso interno
  </div>
</footer>
<script>
// Adicione novas campanhas no topo desta lista.
const CAMPANHAS = [
  {
    parceiro:"Grupo TechLuz Iluminação",
    nome:"Concurso TechLuz",
    periodoLabel:"Abril e Maio / 2026",
    inicio:"2026-04-01", termino:"2026-05-29", pagamento:"2026-06-10",
    pagamentoLabel:"10/06/2026",
    premioMinimo:"R$ 200,00",
    resultadoAte:"05/05/2026",
    link:"campanhas/techluz-abril-maio-2026.html"
  }
];

// "dd/MM/yyyy" -> Date
function parseBR(s){ const p=(s||'').split('/'); return p.length===3 ? new Date(+p[2], +p[1]-1, +p[0]) : null; }

// Aberta (verde) enquanto em vigor; Fechada quando o último resultado é posterior ao término.
function statusOf(c){
  const fim = new Date(c.termino+'T00:00:00');
  const res = parseBR(c.resultadoAte);
  if(res && res > fim) return {cls:'fechada', txt:'FECHADA'};
  return {cls:'aberta', txt:'● ABERTA'};
}

const grid = document.getElementById('grid');
if(!CAMPANHAS.length){
  grid.innerHTML = '<div class="empty">Nenhuma campanha publicada ainda.</div>';
}else{
  grid.innerHTML = CAMPANHAS.map(c=>{
    const s = statusOf(c);
    return `<a class="card" href="${c.link}">
      <div class="head">
        <span class="status ${s.cls}">${s.txt}</span>
        <div class="nome">${c.nome}</div>
      </div>
      <div class="body">
        <div class="row"><span class="k">Período</span><span class="v">${c.periodoLabel}</span></div>
        <div class="row"><span class="k">Prêmio mínimo</span><span class="v">${c.premioMinimo}</span></div>
        <div class="row"><span class="k">Pagamento</span><span class="v">${c.pagamentoLabel}</span></div>
        <div class="row"><span class="k">Resultado até</span><span class="v">${c.resultadoAte}</span></div>
      </div>
      <div class="cta"><span>Ver resultados</span><span>→</span></div>
    </a>`;
  }).join('');
}

// ===== Tema claro/escuro =====
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem('ferretti-theme', t); }catch(e){}
  const b = document.getElementById('themeBtn');
  if(b) b.textContent = (t==='dark' ? '☀️ Claro' : '🌙 Escuro');
}
document.getElementById('themeBtn').addEventListener('click', function(){
  const atual = document.documentElement.getAttribute('data-theme')==='dark' ? 'dark' : 'light';
  setTheme(atual==='dark' ? 'light' : 'dark');
});
setTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'dark' : 'light');
</script>
</body>
</html>
